<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#000; }
</style>
</head>

<body>
<div id="map"></div>

<script>

// ============================
// ✅ 自动获取正确路径（关键修复）
// ============================
const BASE = location.origin + "/HJTR/map";

// ============================
// 配置（根据你实际改）
// ============================
const MAX_ZOOM = 2; // ⚠️ 看你有几个 zoom.x 文件夹
const MIN_ZOOM = 0;
const MAP_SIZE = 8192;

// ============================
// 初始化
// ============================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
});

const bounds = [[0,0],[MAP_SIZE, MAP_SIZE]];
map.fitBounds(bounds);

// ============================
// 🔥 核心 TileLayer（完全匹配你的结构）
// ============================
const tileLayer = L.tileLayer('', {
  tileSize: 256,
  noWrap: true,
  bounds: bounds,

  getTileUrl: function(coords) {

    const z = coords.z;
    const x = coords.x;
    const y = coords.y;

    const url = `${BASE}/tiles/zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;

    console.log("请求:", url); // 👈 调试用

    return url;
  }
});

tileLayer.addTo(map);

// ============================
// ❌ 错误监听（关键）
// ============================
tileLayer.on('tileerror', function(e) {
  console.error("❌ Tile加载失败:", e.coords);
});

// ============================
// 点击查看坐标
// ============================
map.on('click', e => {
  console.log("坐标:", e.latlng);
});

// ============================
// 测试标记
// ============================
L.marker([4000,4000]).addTo(map).bindPopup("测试点");

</script>
</body>
</html>
