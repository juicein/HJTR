<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map Engine</title>

<style>
html,body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

#map {
  width:100%;
  height:100%;
  position:relative;
  cursor:grab;
}

.tile {
  position:absolute;
  width:256px;
  height:256px;
  image-rendering: pixelated;
}

</style>
</head>

<body>

<div id="map"></div>

<script>

// ==========================
// ⚙️ 配置
// ==========================
const TILE_SIZE = 256;

// 👉 切换地图类型
const MODE = "unmined"; // "dynmap"

// 👉 Unmined zoom范围
const MIN_ZOOM = -6;
const MAX_ZOOM = 0;

// ==========================
// 🌍 状态
// ==========================
let map = document.getElementById("map");

let state = {
  zoom: -1,
  x: 0,
  y: 0,
  dragging: false,
  lastX: 0,
  lastY: 0
};

// ==========================
// 🧠 坐标 → tile
// ==========================
function getTileURL(z, x, y) {

  if (MODE === "unmined") {
    return `./tiles/zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;
  }

  if (MODE === "dynmap") {
    let chunkX = Math.floor(x / 32);
    let chunkY = Math.floor(y / 32);
    return `./tiles/world/flat/${chunkX}_${chunkY}/${x}_${y}.png`;
  }

}

// ==========================
// 🧠 渲染 tiles
// ==========================
function render() {

  map.innerHTML = "";

  const width = window.innerWidth;
  const height = window.innerHeight;

  const tilesX = Math.ceil(width / TILE_SIZE) + 2;
  const tilesY = Math.ceil(height / TILE_SIZE) + 2;

  const startX = Math.floor(state.x / TILE_SIZE);
  const startY = Math.floor(state.y / TILE_SIZE);

  for (let dx = -1; dx < tilesX; dx++) {
    for (let dy = -1; dy < tilesY; dy++) {

      let tx = startX + dx;
      let ty = startY + dy;

      let img = document.createElement("img");
      img.className = "tile";

      img.style.left = (tx * TILE_SIZE - state.x) + "px";
      img.style.top  = (ty * TILE_SIZE - state.y) + "px";

      img.src = getTileURL(state.zoom, tx, ty);

      // ❗ 不存在就隐藏
      img.onerror = () => img.remove();

      map.appendChild(img);
    }
  }
}

// ==========================
// 🖱️ 拖动
// ==========================
map.onmousedown = (e) => {
  state.dragging = true;
  map.style.cursor = "grabbing";
  state.lastX = e.clientX;
  state.lastY = e.clientY;
};

window.onmouseup = () => {
  state.dragging = false;
  map.style.cursor = "grab";
};

window.onmousemove = (e) => {

  if (!state.dragging) return;

  let dx = e.clientX - state.lastX;
  let dy = e.clientY - state.lastY;

  state.x -= dx;
  state.y -= dy;

  state.lastX = e.clientX;
  state.lastY = e.clientY;

  render();
};

// ==========================
// 🔍 缩放（核心）
// ==========================
map.onwheel = (e) => {

  let oldZoom = state.zoom;

  if (e.deltaY < 0) {
    state.zoom++;
  } else {
    state.zoom--;
  }

  // 限制范围
  state.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, state.zoom));

  // 缩放比例
  let scale = Math.pow(2, state.zoom - oldZoom);

  // 👇 关键：缩放中心保持
  state.x = state.x * scale;
  state.y = state.y * scale;

  render();
};

// ==========================
// 🚀 初始化
// ==========================
render();

window.onresize = render;

</script>

</body>
</html>
