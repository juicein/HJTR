<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map (Stable)</title>

<style>
html,body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

#map {
  width:100%;
  height:100%;
  position:relative;
  cursor:grab;
}

.tile {
  position:absolute;
  width:256px;
  height:256px;
  image-rendering: pixelated;
}
</style>
</head>

<body>

<div id="map"></div>

<!-- 👇 引入你提供的 Unmined 数据 -->
<script src="./unmined.js"></script>

<script>

// ==========================
// 基本配置
// ==========================
const TILE_SIZE = 256;
const map = document.getElementById("map");

// 从 Unmined 自动读取
const MIN_ZOOM = UnminedMapProperties.minZoom;
const MAX_ZOOM = UnminedMapProperties.maxZoom;

// ==========================
// 状态
// ==========================
let state = {
  x: 0,
  z: 0,
  zoom: -1,
  dragging: false,
  lastX: 0,
  lastY: 0
};

// ==========================
// 🔥 判断 tile 是否存在（关键）
// ==========================
function tileExists(x, z) {

  const regionX = Math.floor(x / 32);
  const regionZ = Math.floor(z / 32);

  const region = UnminedRegions.find(r => r.x === regionX && r.z === regionZ);

  if (!region) return false;

  const localX = ((x % 32) + 32) % 32;
  const localZ = ((z % 32) + 32) % 32;

  const row = region.m[localZ];

  return (row & (1 << localX)) !== 0;
}

// ==========================
// 获取 tile URL
// ==========================
function getTileURL(z, x, z2) {
  return `./tiles/zoom.${z}/${x}/${z2}/tile.${x}.${z2}.webp`;
}

// ==========================
// 渲染
// ==========================
function render() {

  map.innerHTML = "";

  const w = window.innerWidth;
  const h = window.innerHeight;

  const tilesX = Math.ceil(w / TILE_SIZE) + 2;
  const tilesZ = Math.ceil(h / TILE_SIZE) + 2;

  const startX = Math.floor(state.x / TILE_SIZE);
  const startZ = Math.floor(state.z / TILE_SIZE);

  for (let dx = -tilesX; dx < tilesX; dx++) {
    for (let dz = -tilesZ; dz < tilesZ; dz++) {

      const tx = startX + dx;
      const tz = startZ + dz;

      // ❗ 只加载存在的 tile（关键修复）
      if (!tileExists(tx, tz)) continue;

      const img = document.createElement("img");
      img.className = "tile";

      img.style.left = (tx * TILE_SIZE - state.x + w/2) + "px";
      img.style.top  = (tz * TILE_SIZE - state.z + h/2) + "px";

      img.src = getTileURL(state.zoom, tx, tz);

      img.onerror = () => img.remove();

      map.appendChild(img);
    }
  }
}

// ==========================
// 拖动
// ==========================
map.onmousedown = (e) => {
  state.dragging = true;
  map.style.cursor = "grabbing";
  state.lastX = e.clientX;
  state.lastY = e.clientY;
};

window.onmouseup = () => {
  state.dragging = false;
  map.style.cursor = "grab";
};

window.onmousemove = (e) => {

  if (!state.dragging) return;

  let dx = e.clientX - state.lastX;
  let dz = e.clientY - state.lastY;

  state.x -= dx;
  state.z -= dz;

  state.lastX = e.clientX;
  state.lastY = e.clientY;

  render();
};

// ==========================
// 缩放
// ==========================
map.onwheel = (e) => {

  let oldZoom = state.zoom;

  if (e.deltaY < 0) {
    state.zoom++;
  } else {
    state.zoom--;
  }

  state.zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, state.zoom));

  let scale = Math.pow(2, state.zoom - oldZoom);

  state.x *= scale;
  state.z *= scale;

  render();
};

// ==========================
// 初始化居中（自动）
// ==========================
state.x = ((UnminedMapProperties.minRegionX + UnminedMapProperties.maxRegionX) * 16) * TILE_SIZE;
state.z = ((UnminedMapProperties.minRegionZ + UnminedMapProperties.maxRegionZ) * 16) * TILE_SIZE;

// 启动
render();

window.onresize = render;

</script>

</body>
</html>
