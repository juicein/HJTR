<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map</title>

<style>
html,body {
  margin:0;
  height:100%;
  background:#000;
  overflow:hidden;
}

#map {
  position:relative;
  width:100%;
  height:100%;
  cursor:grab;
}

.tile {
  position:absolute;
  width:256px;
  height:256px;
  image-rendering: pixelated;
}
</style>
</head>

<body>

<div id="map"></div>

<script>

// ==========================
// ✅ 你的服务器路径（已修正）
// ==========================
const BASE_URL = "/map/tiles";

// ==========================
const TILE_SIZE = 256;
const map = document.getElementById("map");

// ==========================
// 🌍 状态
// ==========================
let state = {
  x: 0,
  z: 0,
  zoom: -1,
  dragging: false,
  lastX: 0,
  lastY: 0
};

// ==========================
// 🔥 关键：正确 tile 路径
// ==========================
function getTileURL(z, x, z2) {
  return `${BASE_URL}/zoom.${z}/${x}/${z2}/tile.${x}.${z2}.webp`;
}

// ==========================
// 🔥 渲染（重写过的稳定版）
// ==========================
function render() {

  map.innerHTML = "";

  const w = window.innerWidth;
  const h = window.innerHeight;

  const tilesX = Math.ceil(w / TILE_SIZE) + 4;
  const tilesZ = Math.ceil(h / TILE_SIZE) + 4;

  const centerTileX = Math.floor(state.x / TILE_SIZE);
  const centerTileZ = Math.floor(state.z / TILE_SIZE);

  for (let dx = -tilesX; dx <= tilesX; dx++) {
    for (let dz = -tilesZ; dz <= tilesZ; dz++) {

      const tx = centerTileX + dx;
      const tz = centerTileZ + dz;

      const img = document.createElement("img");
      img.className = "tile";

      // 👇 核心定位（修复黑屏关键）
      const screenX = (tx * TILE_SIZE - state.x) + w/2;
      const screenZ = (tz * TILE_SIZE - state.z) + h/2;

      img.style.left = screenX + "px";
      img.style.top  = screenZ + "px";

      img.src = getTileURL(state.zoom, tx, tz);

      // ❗ 不存在直接删除（避免破图）
      img.onerror = () => img.remove();

      map.appendChild(img);
    }
  }
}

// ==========================
// 🖱️ 拖动
// ==========================
map.onmousedown = (e) => {
  state.dragging = true;
  map.style.cursor = "grabbing";
  state.lastX = e.clientX;
  state.lastY = e.clientY;
};

window.onmouseup = () => {
  state.dragging = false;
  map.style.cursor = "grab";
};

window.onmousemove = (e) => {

  if (!state.dragging) return;

  const dx = e.clientX - state.lastX;
  const dz = e.clientY - state.lastY;

  state.x -= dx;
  state.z -= dz;

  state.lastX = e.clientX;
  state.lastY = e.clientY;

  render();
};

// ==========================
// 🔍 缩放（稳定版）
// ==========================
map.onwheel = (e) => {

  const oldZoom = state.zoom;

  if (e.deltaY < 0) {
    state.zoom++;
  } else {
    state.zoom--;
  }

  state.zoom = Math.max(-6, Math.min(0, state.zoom));

  // 👇 缩放补偿（关键）
  const scale = Math.pow(2, state.zoom - oldZoom);
  state.x *= scale;
  state.z *= scale;

  render();
};

// ==========================
// 🚀 初始化（关键修复）
// ==========================

// 👉 强制定位到一个“有 tile 的地方”
state.x = 0;
state.z = 0;

// 启动
render();

window.onresize = render;

</script>

</body>
</html>
