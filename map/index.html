<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#000; }
</style>
</head>

<body>
<div id="map"></div>

<script>

// =============================
// ✅ GitHub Pages路径
// =============================
const BASE = "https://juicein.github.io/HJTR/map";

// =============================
// ✅ 你的真实zoom范围
// =============================
const MIN_ZOOM_REAL = -6;
const MAX_ZOOM_REAL = 0;

// 👉 转换成 Leaflet 用的
const MIN_ZOOM = 0;
const MAX_ZOOM = Math.abs(MIN_ZOOM_REAL);

// =============================
// ✅ 偏移量（核心）
// 👉 让负坐标变正
// =============================
const OFFSET = 10; 
// ⚠️ 这里可以调大（比如 20 / 50）
// 只要覆盖你最大负数即可

// =============================
// 初始化地图
// =============================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
});

// 地图范围（必须够大）
const MAP_SIZE = 8192;
const bounds = [[0,0],[MAP_SIZE, MAP_SIZE]];
map.fitBounds(bounds);

// =============================
// 🔥 核心转换逻辑
// =============================
const layer = L.tileLayer('', {
  tileSize: 256,
  noWrap: true,
  bounds: bounds,

  getTileUrl: function(coords) {

    // Leaflet zoom → 真实 zoom
    const realZ = MAX_ZOOM_REAL - coords.z;

    // 偏移坐标
    const realX = coords.x - OFFSET;
    const realY = coords.y - OFFSET;

    const url = `${BASE}/tiles/zoom.${realZ}/${realX}/${realY}/tile.${realX}.${realY}.webp`;

    console.log("请求:", url);

    return url;
  }
});

layer.addTo(map);

// =============================
// ❌ 错误调试
// =============================
layer.on('tileerror', e => {
  console.error("❌ 加载失败:", e.coords);
});

// =============================
// 点击查看坐标
// =============================
map.on('click', e => {
  console.log("点击:", e.latlng);
});

// =============================
// 测试点
// =============================
L.marker([2000,2000])
  .addTo(map)
  .bindPopup("测试点")
  .openPopup();

</script>
</body>
</html>
