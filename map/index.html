<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Material Maps</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-search-bar m3-elevation">
        <span class="material-symbols-rounded">menu</span>
        <input type="text" placeholder="在这里搜索...">
        <span class="material-symbols-rounded" id="btn-settings">settings</span>
    </div>

    <div id="crosshair" class="crosshair hidden">
        <span class="material-symbols-rounded">my_location</span>
    </div>

    <div class="zoom-controls m3-elevation">
        <button id="btn-zoom-in"><span class="material-symbols-rounded">add</span></button>
        <button id="btn-zoom-out"><span class="material-symbols-rounded">remove</span></button>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <svg class="vector-layer" id="vector-layer"></svg>
        <div class="marker-container"></div>
    </div>

    <div id="bottom-sheet" class="bottom-sheet m3-elevation-high">
        <div class="sheet-drag-handle"></div>
        <div class="sheet-content" id="sheet-content">
            </div>
    </div>

    <div id="context-menu" class="context-menu m3-elevation">
        <div class="menu-item" id="ctx-copy-coords">
            <span class="material-symbols-rounded">content_copy</span> <span id="ctx-coords-text">0, 0</span>
        </div>
        <hr>
        <div class="menu-item"><span class="material-symbols-rounded">directions</span> 从这里出发</div>
        <div class="menu-item"><span class="material-symbols-rounded">route</span> 到这里去</div>
        <div class="menu-item"><span class="material-symbols-rounded">add_location</span> 添加缺失地点</div>
    </div>

    <div id="settings-dialog" class="settings-dialog m3-elevation-high hidden">
        <h3>地图设置</h3>
        <label class="setting-item">
            <span>显示中心十字准星</span>
            <input type="checkbox" id="setting-crosshair">
        </label>
        <label class="setting-item">
            <span>记忆上次浏览位置</span>
            <input type="checkbox" id="setting-remember">
        </label>
        <button id="btn-close-settings" class="m3-btn">完成</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
