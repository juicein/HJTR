<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft BE Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#000; }
</style>
</head>

<body>
<div id="map"></div>

<script>

// ==============================
// 🔥 你的 GitHub 路径（必须对）
// ==============================
const BASE = "https://juicein.github.io/HJTR/map/tiles";

// ==============================
// 🔥 关键：zoom 映射（核心修复）
// ==============================
// 你的范围：-6 → 0
const MIN_NATIVE_ZOOM = -6;
const MAX_NATIVE_ZOOM = 0;

// 转换成 Leaflet：
const MIN_ZOOM = 0;
const MAX_ZOOM = MAX_NATIVE_ZOOM - MIN_NATIVE_ZOOM; 
// = 6

// ==============================
// 地图大小（先随便给大一点）
// ==============================
const MAP_SIZE = 16384;

// ==============================
// 初始化地图
// ==============================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
});

const bounds = [[-MAP_SIZE, -MAP_SIZE], [MAP_SIZE, MAP_SIZE]];
map.fitBounds(bounds);

// ==============================
// 🔥 核心 TileLayer（完全适配负坐标）
// ==============================
const tileLayer = L.tileLayer('', {
  tileSize: 256,
  noWrap: true,
  bounds: bounds,

  getTileUrl: function(coords) {

    // Leaflet zoom → 转换回你的 zoom
    const realZ = coords.z + MIN_NATIVE_ZOOM;

    const x = coords.x;
    const y = coords.y;

    const url = `${BASE}/zoom.${realZ}/${x}/${y}/tile.${x}.${y}.webp`;

    console.log("请求:", url);

    return url;
  }
});

tileLayer.addTo(map);

// ==============================
// ❌ 错误监听（调试用）
// ==============================
tileLayer.on('tileerror', function(e) {
  console.error("❌ Tile加载失败:", e.coords);
});

// ==============================
// 点击查看坐标
// ==============================
map.on('click', e => {
  console.log("坐标:", e.latlng);
});

// ==============================
// 测试标记（负坐标）
// ==============================
L.marker([0,0]).addTo(map).bindPopup("中心点").openPopup();

</script>
</body>
</html>
