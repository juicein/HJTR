<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Minecraft Web Map</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }
    #map {
      width: 100%;
      height: 100%;
      background: #000;
    }
  </style>
</head>

<body>
<div id="map"></div>

<script>
// ============================
// 核心参数（你可以改）
// ============================
const TILE_SIZE = 256;
const MAX_ZOOM = 6;   // 改成你tiles最大层级
const MIN_ZOOM = 0;

// Minecraft世界大小（重要）
// 这里假设中心在 0,0
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
});

// ============================
// 计算地图范围
// ============================
// 假设最大尺寸（你可以根据unmined输出调整）
const bounds = [[0,0], [8192,8192]];

map.fitBounds(bounds);

// ============================
// 加载 tiles
// ============================
L.tileLayer('./tiles/{z}/{x}/{y}.webp', {
  tileSize: TILE_SIZE,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
  noWrap: true,
  bounds: bounds
}).addTo(map);

// ============================
// 示例：添加标记（酒店）
// ============================
const marker = L.marker([4000, 4000]).addTo(map);
marker.bindPopup("🏨 Hotel Example").openPopup();

// ============================
// 示例：点击显示坐标
// ============================
map.on('click', function(e) {
  console.log("坐标:", e.latlng);
});

</script>
</body>
</html>
