<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Map Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <label>X:</label><input type="number" id="coordinates-x" value="0">
            <label>Z:</label><input type="number" id="coordinates-z" value="0">
        </div>
        <div class="input-group">
            <input type="text" id="search-input" placeholder="搜索地标...">
            <button id="search-btn">搜索</button>
        </div>
    </div>

    <div class="zoom-controls">
        <button id="btn-zoom-in">+</button>
        <button id="btn-zoom-out">-</button>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <div class="marker-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
