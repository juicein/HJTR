<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>MC Map Engine</title>

<style>
html,body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#000;
}

#map {
  width:100%;
  height:100%;
  position:relative;
  cursor:grab;
}

.tile {
  position:absolute;
  width:256px;
  height:256px;
  image-rendering: pixelated;
}
</style>
</head>

<body>
<div id="map"></div>

<script>

// =============================
// 🔥 配置区
// =============================

// 模式切换：unmined / dynmap
const MODE = "unmined";

// Unmined路径
const UNMINED_BASE = "./tiles";

// Dynmap路径
const DYNMAP_BASE = "./dynmap/tiles/world/flat";

// =============================
// 地图状态
// =============================
let zoom = -2;          // 当前缩放
let tileSize = 256;
let centerX = 0;        // 世界坐标
let centerY = 0;

const map = document.getElementById("map");

// =============================
// 🔥 核心：获取tile URL
// =============================
function getTileURL(z, x, y) {

  if (MODE === "unmined") {
    return `${UNMINED_BASE}/zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;
  }

  if (MODE === "dynmap") {
    return `${DYNMAP_BASE}/${x}_${y}/${z}_${x}_${y}.png`;
  }
}

// =============================
// 渲染瓦片（核心）
// =============================
function render() {

  map.innerHTML = "";

  const rect = map.getBoundingClientRect();

  const tilesX = Math.ceil(rect.width / tileSize) + 2;
  const tilesY = Math.ceil(rect.height / tileSize) + 2;

  const startX = Math.floor(centerX / tileSize) - Math.floor(tilesX/2);
  const startY = Math.floor(centerY / tileSize) - Math.floor(tilesY/2);

  for (let dx = 0; dx < tilesX; dx++) {
    for (let dy = 0; dy < tilesY; dy++) {

      const x = startX + dx;
      const y = startY + dy;

      const img = document.createElement("img");
      img.className = "tile";

      img.style.left = (dx * tileSize - (centerX % tileSize)) + "px";
      img.style.top  = (dy * tileSize - (centerY % tileSize)) + "px";

      img.src = getTileURL(zoom, x, y);

      // ❗ 不存在就隐藏（不会碎格）
      img.onerror = () => img.style.display = "none";

      map.appendChild(img);
    }
  }
}

// =============================
// 拖动（像 Google Maps）
// =============================
let dragging = false;
let lastX, lastY;

map.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
  map.style.cursor = "grabbing";
});

window.addEventListener("mouseup", () => {
  dragging = false;
  map.style.cursor = "grab";
});

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  centerX -= dx;
  centerY -= dy;

  lastX = e.clientX;
  lastY = e.clientY;

  render();
});

// =============================
// 缩放（滚轮）
// =============================
map.addEventListener("wheel", e => {

  e.preventDefault();

  if (e.deltaY < 0) zoom++;
  else zoom--;

  // 限制范围（根据你数据）
  zoom = Math.max(-6, Math.min(0, zoom));

  render();
});

// =============================
// 初始化
// =============================
render();

</script>
</body>
</html>
