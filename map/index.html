<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Material Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="search-box m3-surface">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="search-input" placeholder="搜索地点、道路...">
            <button id="btn-layers" class="icon-btn"><span class="material-symbols-rounded">layers</span></button>
        </div>
        <div class="coords-display m3-surface" id="coords-display">X: 0, Z: 0</div>
    </div>

    <div class="layer-menu m3-surface" id="layer-menu">
        <button onclick="switchLayer('all')" class="active"><span class="material-symbols-rounded">map</span> 默认地图</button>
        <button onclick="switchLayer('travel')"><span class="material-symbols-rounded">directions_car</span> 出行地图 (仅道路)</button>
        <button onclick="switchLayer('transit')"><span class="material-symbols-rounded">directions_subway</span> 公交地图 (仅轨交)</button>
        <button onclick="switchLayer('none')"><span class="material-symbols-rounded">satellite_alt</span> 原始地图 (无标线)</button>
    </div>

    <div class="fab-controls">
        <button id="btn-my-location" class="fab"><span class="material-symbols-rounded">my_location</span></button>
        <div class="zoom-group">
            <button id="btn-zoom-in"><span class="material-symbols-rounded">add</span></button>
            <hr>
            <button id="btn-zoom-out"><span class="material-symbols-rounded">remove</span></button>
        </div>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <svg class="line-layer" id="line-layer" width="100%" height="100%"></svg>
        <div class="region-container" id="region-container"></div>
        <div class="marker-container" id="marker-container"></div>
    </div>

    <div class="context-menu m3-surface" id="context-menu">
        <div class="context-header" id="ctx-coords">0, 0</div>
        <button onclick="copyCoords()"><span class="material-symbols-rounded">content_copy</span> 复制坐标</button>
        <button onclick="openRouteDialog(window.lastClickedCoords, null)"><span class="material-symbols-rounded">directions</span> 从这里出发</button>
        <button onclick="openRouteDialog(null, window.lastClickedCoords)"><span class="material-symbols-rounded">location_on</span> 到这里去</button>
        <button onclick="addLocationRedirect()"><span class="material-symbols-rounded">add_location</span> 添加地点</button>
    </div>

    <div class="bottom-sheet m3-surface" id="bottom-sheet">
        <div class="drag-handle"></div>
        
        <div class="sheet-content" id="sheet-poi" style="display: none;"></div>
        
        <div class="sheet-content" id="sheet-route" style="display: none;">
            <div class="route-header">
                <button class="icon-btn" onclick="closeBottomSheet()"><span class="material-symbols-rounded">close</span></button>
                <h2>路线</h2>
            </div>
            
            <div class="route-tabs">
                <button class="route-tab active" id="tab-drive" onclick="setRouteMode('drive')"><span class="material-symbols-rounded">directions_car</span></button>
                <button class="route-tab" id="tab-transit" onclick="setRouteMode('transit')"><span class="material-symbols-rounded">directions_subway</span></button>
            </div>

            <div class="route-inputs m3-surface-variant">
                <div class="route-line-decor"></div>
                <input type="text" id="route-start-input" placeholder="选择起点 (或点击地图)" readonly>
                <hr>
                <input type="text" id="route-end-input" placeholder="选择终点 (或点击地图)" readonly>
            </div>

            <div id="route-results" class="route-results">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
