<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map (FULL)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#000; }
</style>
</head>

<body>
<div id="map"></div>

<script>

// =============================
// 配置
// =============================
const TILE_BASE = new URL('./tiles/', location.href).href;

// 你的真实 zoom
const MIN_ZOOM = -6;
const MAX_ZOOM = 0;

// =============================
// 初始化地图
// =============================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
  zoomSnap: 1,
  zoomDelta: 1,
});

// 👇 关键：不要用 fitBounds
map.setView([0, 0], -2);

// =============================
// 🔥 自定义 TileLayer（核心）
// =============================
const MinecraftLayer = L.TileLayer.extend({

  createTile: function(coords, done) {
    const tile = document.createElement('img');

    const z = coords.z;
    const x = coords.x;
    const y = coords.y;

    const url = `${TILE_BASE}zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;

    tile.src = url;

    tile.onload = () => done(null, tile);
    tile.onerror = () => done(null, tile); // 👈 不报错（关键）

    return tile;
  }

});

// 添加图层
new MinecraftLayer('', {
  tileSize: 256,
  noWrap: true,
  keepBuffer: 8,   // 👈 提前加载周围
  updateWhenIdle: false,
  updateWhenZooming: true,
}).addTo(map);

// =============================
// 调试
// =============================
map.on('click', e => {
  console.log("坐标:", e.latlng);
});

// 测试点
L.marker([0,0]).addTo(map).bindPopup("中心点");

</script>
</body>
</html>
