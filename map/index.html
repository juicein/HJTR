
<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Material Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <div class="search-box m3-surface">
            <span class="material-symbols-rounded">search</span>
            <input type="text" id="search-input" placeholder="搜索地点、道路...">
            <button id="btn-layers" class="icon-btn"><span class="material-symbols-rounded">layers</span></button>
            <button id="btn-settings" class="icon-btn"><span class="material-symbols-rounded">settings</span></button>
        </div>
        <div class="coords-display m3-surface" id="coords-display">X: 0, Z: 0</div>
    </div>

    <div class="fab-controls">
        <button id="btn-exit-route" class="fab" style="display:none; background: #ffdad6; color: #410002;"><span class="material-symbols-rounded">close</span></button>
        <button id="btn-my-location" class="fab"><span class="material-symbols-rounded">my_location</span></button>
        <div class="zoom-group">
            <button id="btn-zoom-in"><span class="material-symbols-rounded">add</span></button>
            <hr>
            <button id="btn-zoom-out"><span class="material-symbols-rounded">remove</span></button>
        </div>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <div class="region-container" id="region-container"></div>
        <svg class="line-layer" id="line-layer" width="100%" height="100%"></svg>
        <div class="marker-container"></div>
        <div class="crosshair" id="crosshair">
            <span class="material-symbols-rounded">add</span>
        </div>
    </div>

    <div class="context-menu m3-surface" id="context-menu">
        <div class="context-header" id="ctx-coords">0, 0</div>
        <button onclick="copyCoords()"><span class="material-symbols-rounded">content_copy</span> 复制坐标</button>
        <button onclick="setRouteStart()"><span class="material-symbols-rounded">directions_car</span> 从这里出发</button>
        <button onclick="setRouteEnd()"><span class="material-symbols-rounded">location_on</span> 到这里去</button>
        <button onclick="addLocationRedirect()"><span class="material-symbols-rounded">add_location</span> 添加地点</button>
    </div>

    <div class="bottom-sheet m3-surface" id="bottom-sheet">
        <div class="drag-handle"></div>
        <div class="sheet-content" id="sheet-content"></div>
    </div>

    <div class="route-panel m3-surface" id="route-panel">
        <div class="route-header">
            <button class="icon-btn" onclick="closeRoutePanel()"><span class="material-symbols-rounded">arrow_back</span></button>
            <div class="route-inputs">
                <div class="route-input-box">
                    <span class="material-symbols-rounded" style="color:var(--md-sys-color-primary); font-size:18px;">my_location</span>
                    <input type="text" id="route-start-input" placeholder="选择起点或输入坐标(如 0,0)" readonly>
                </div>
                <div class="route-input-box">
                    <span class="material-symbols-rounded" style="color:#d93025; font-size:18px;">location_on</span>
                    <input type="text" id="route-end-input" placeholder="选择终点或输入坐标" readonly>
                </div>
            </div>
            <button class="icon-btn" onclick="swapRoute()"><span class="material-symbols-rounded">swap_vert</span></button>
        </div>
        <div class="route-tabs">
            <button class="route-tab active" data-mode="drive"><span class="material-symbols-rounded">directions_car</span></button>
            <button class="route-tab" data-mode="transit"><span class="material-symbols-rounded">directions_subway</span></button>
            <button class="route-tab" data-mode="walk"><span class="material-symbols-rounded">directions_walk</span></button>
        </div>
        <div class="route-options" id="route-options-list">
            </div>
    </div>

    <div class="settings-modal m3-surface" id="layers-modal" style="display:none;">
        <h3>地图类型</h3>
        <div class="layer-options">
            <button class="layer-btn active" data-layer="all">
                <span class="material-symbols-rounded">map</span><span>综合出行</span>
            </button>
            <button class="layer-btn" data-layer="transit">
                <span class="material-symbols-rounded">directions_subway</span><span>公交地图</span>
            </button>
            <button class="layer-btn" data-layer="drive">
                <span class="material-symbols-rounded">directions_car</span><span>驾车地图</span>
            </button>
            <button class="layer-btn" data-layer="raw">
                <span class="material-symbols-rounded">satellite</span><span>卫星/原图</span>
            </button>
        </div>
        <button class="close-btn" onclick="document.getElementById('layers-modal').style.display='none'">关闭</button>
    </div>

    <div class="settings-modal m3-surface" id="settings-modal" style="display:none;">
        <h3>地图设置</h3>
        <label class="switch-label"><span>显示十字准星</span><input type="checkbox" id="toggle-crosshair" checked></label>
        <label class="switch-label"><span>显示坐标信息</span><input type="checkbox" id="toggle-coords" checked></label>
        <label class="switch-label"><span>记住上次位置</span><input type="checkbox" id="toggle-memory" checked></label>
        <button class="close-btn" id="btn-close-settings">关闭</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
