<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map (Universal)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body {margin:0;height:100%;}
#map {width:100%;height:100%;background:#000;}
</style>
</head>

<body>
<div id="map"></div>

<script>
// =====================
// 配置区域（你改这里）
// =====================

// 👉 切换地图类型
const MODE = "unmined"; 
// "unmined" 或 "dynmap"

// tile格式
const EXT = "webp"; // 或 png

const MAX_ZOOM = 6;

// =====================
// 初始化地图
// =====================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: 0,
  maxZoom: MAX_ZOOM,
});

const bounds = [[0,0],[8192,8192]];
map.fitBounds(bounds);

// =====================
// 自定义 Tile Layer
// =====================
const CustomLayer = L.TileLayer.extend({

  getTileUrl: function(coords) {
    const z = coords.z;
    const x = coords.x;
    const y = coords.y;

    // =====================
    // Unmined 适配
    // =====================
    if (MODE === "unmined") {
      return `./tiles/zoom.${z}/${x}/${y}/tile.${x}.${y}.${EXT}`;
    }

    // =====================
    // Dynmap 适配
    // =====================
    if (MODE === "dynmap") {
      return `./tiles/flat/${z}/${x}_${y}.${EXT}`;
    }
  }

});

// 加载图层
new CustomLayer('', {
  tileSize: 256,
  noWrap: true,
  bounds: bounds
}).addTo(map);

// =====================
// 测试标记
// =====================
L.marker([4000,4000]).addTo(map)
  .bindPopup("📍 Test Location");

// =====================
// 点击查看坐标
// =====================
map.on('click', e => {
  console.log(`X: ${e.latlng.lng}, Z: ${e.latlng.lat}`);
});

</script>
</body>
</html>
