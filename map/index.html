<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Map Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="control-panel">
        <div class="input-group">
            <label>X:</label><input type="number" id="coordinates-x" value="0">
            <label>Z:</label><input type="number" id="coordinates-z" value="0">
        </div>
        <div class="input-group">
            <input type="text" id="search-input" placeholder="搜索地标...">
            <select id="category-filter">
                <option value="all">全部分类</option>
                <option value="hotel">酒店</option>
                <option value="bus">交通</option>
            </select>
            <button id="search-btn">搜索</button>
        </div>
        <div class="no-results" style="display:none; color: #ff4444; font-size: 12px;">附近未找到标记点</div>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <div class="marker-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
