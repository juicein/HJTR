<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map FIXED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#000; }
</style>
</head>

<body>
<div id="map"></div>

<script>

const TILE_BASE = new URL('./tiles/', location.href).href;

// 👇 根据你实际改（重要！）
const TILE_RANGE = {
  minX: -2,
  maxX: 2,
  minY: -10,
  maxY: 10
};

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -6,
  maxZoom: 0,
});

map.setView([0,0], -2);

// =============================
// 核心 TileLayer
// =============================
const Layer = L.TileLayer.extend({

  createTile: function(coords, done) {

    const tile = document.createElement('img');

    const z = coords.z;
    const x = coords.x;
    const y = coords.y;

    // ❗ 限制范围（核心修复）
    if (
      x < TILE_RANGE.minX || x > TILE_RANGE.maxX ||
      y < TILE_RANGE.minY || y > TILE_RANGE.maxY
    ) {
      tile.style.display = "none";
      done(null, tile);
      return tile;
    }

    const url = `${TILE_BASE}zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;

    tile.src = url;

    tile.onload = () => done(null, tile);
    tile.onerror = () => {
      tile.style.display = "none";
      done(null, tile);
    };

    return tile;
  }

});

new Layer('', {
  tileSize: 256,
  noWrap: true,
  keepBuffer: 6
}).addTo(map);

// 测试
L.marker([0,0]).addTo(map).bindPopup("中心");

</script>
</body>
</html>
