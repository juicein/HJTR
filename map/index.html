<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        /* 让地图铺满全屏 */
        #map { width: 100vw; height: 100vh; background-color: #1a1a1a; } 
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 初始化地图
    // 使用 L.CRS.Simple，因为 Minecraft 像是一张平面的纸，而不是地球（无需墨卡托投影）
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -6,
        maxZoom: 0,
        zoomControl: true 
    });

    // 2. 自定义 Unmined 瓦片图层加载逻辑
    L.TileLayer.Unmined = L.TileLayer.extend({
        getTileUrl: function(coords) {
            const z = coords.z;
            const x = coords.x;
            // 注意：Leaflet 的 Y 轴方向与 Minecraft 可能相反，如果不匹配，之后可以尝试 const y = -coords.y;
            const y = coords.y;

            // 按照 Unmined 的结构计算分组文件夹 (除以 10 并向下取整)
            const groupX = Math.floor(x / 10);
            const groupY = Math.floor(y / 10);

            // 拼接你提供的目录结构路径
            // 请确保此相对路径指向你的 HJTR/map/tiles 目录
            return `HJTR/map/tiles/zoom.${z}/${groupX}/${groupY}/tile.${x}.${y}.webp`;
        }
    });

    // 3. 实例化图层并添加到地图
    const unminedLayer = new L.TileLayer.Unmined('', {
        tileSize: 256, // Unmined 默认瓦片大小通常是 256x256
        noWrap: true,  // 游戏地图不应该像地球一样无限循环拼接
        bounds: [[-10000, -10000], [10000, 10000]], // 限制拖动范围，后续可根据地图实际大小调整
        // 如果某个区域没有瓦片（没探索过），加载一张 1x1 的全透明图片，防止控制台报错
        errorTileUrl: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='
    });

    map.addLayer(unminedLayer);

    // 4. 设置初始中心点和缩放层级 (x, y)
    // 根据你的地图实际情况，调整初始看向的坐标
    map.setView([0, 0], -3); 

</script>
</body>
</html>
