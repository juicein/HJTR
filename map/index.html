<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Web Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { width: 100vw; height: 100vh; background-color: #1a1a1a; }
        .popup-img { width: 100%; max-width: 200px; border-radius: 5px; margin-top: 5px; }
        .popup-title { font-weight: bold; font-size: 16px; margin: 0 0 5px 0; }
        .popup-desc { color: #666; font-size: 13px; margin: 0; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. 初始化地图，使用简单的平面坐标系 (Minecraft 是平的，不是地球)
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: -6, // 对应你文件夹的 zoom.-6
        maxZoom: 0,  // 对应你文件夹的 zoom.0
        zoomControl: true
    });

    // 默认视角和缩放
    map.setView([0, 0], -2);

    // 2. 自定义瓦片图层 (适配你的 Unmined 目录结构)
    const MinecraftTileLayer = L.TileLayer.extend({
        getTileUrl: function(coords) {
            // Leaflet 的 y 轴向下是正的，Minecraft 可能需要根据你的生成器调整
            const z = coords.z;
            const x = coords.x;
            const y = coords.y;
            
            // 根据你提供的结构：zoom.{z}/{x}/{y}/tile.{x}.{y}.webp
            return `HJTR/map/tiles/zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;
        }
    });

    // 实例化并添加到地图
    // noWrap: true 禁止地图横向复制，bounds 限制地图边缘
    new MinecraftTileLayer('', {
        noWrap: true,
        tileSize: 256, // Unmined 默认瓦片大小通常是 256 或 512
        errorTileUrl: 'images/empty_tile.png' // 如果该区域没跑图，显示的透明或默认图片
    }).addTo(map);

    // 3. 定义不同地标的 Logo 图标
    const icons = {
        bus: L.icon({
            iconUrl: 'images/icons/bus.png', // 请替换为你的公交站图标路径
            iconSize: [32, 32],
            iconAnchor: [16, 32], // 图标的哪个点对准坐标
            popupAnchor: [0, -32] // 弹出框在图标的相对位置
        }),
        hotel: L.icon({
            iconUrl: 'images/icons/hotel.png', // 请替换为你的酒店图标路径
            iconSize: [32, 32],
            iconAnchor: [16, 32],
            popupAnchor: [0, -32]
        })
    };

    // 4. 加载并渲染 JSON 数据
    // 实际项目中请用 fetch('data.json') 替代直接读取对象
    const mapData = {
        "landmarks": [
            { "id": "1", "name": "中心公交总站", "type": "bus", "coords": [-200, 150], "image": "https://via.placeholder.com/200x100?text=Bus+Station", "description": "主城区的核心交通枢纽。" },
            { "id": "2", "name": "海景大酒店", "type": "hotel", "coords": [300, -100], "image": "https://via.placeholder.com/200x100?text=Hotel+View", "description": "豪华海景房，附带游泳池。" }
        ],
        "routes": [
            { "id": "r1", "name": "主干道", "type": "road", "color": "#aaaaaa", "weight": 8, "points": [[-200, 150], [0, 50], [300, -100]] },
            { "id": "m1", "name": "地铁1号线", "type": "subway", "color": "#FF0000", "weight": 5, "dashArray": "10, 10", "points": [[-200, 150], [300, -100]] }
        ]
    };

    // 绘制道路和地铁 (Polyline)
    mapData.routes.forEach(route => {
        L.polyline(route.points, {
            color: route.color,
            weight: route.weight,
            dashArray: route.dashArray || '', // 用于画虚线（地铁）
            opacity: 0.8
        }).addTo(map).bindPopup(route.name);
    });

    // 绘制地标 (Markers)
    mapData.landmarks.forEach(poi => {
        const marker = L.marker(poi.coords, { 
            icon: icons[poi.type] || new L.Icon.Default() 
        }).addTo(map);

        // 绑定弹出框 (HTML 结构预留了图片位置)
        const popupContent = `
            <div style="text-align: center;">
                <h3 class="popup-title">${poi.name}</h3>
                ${poi.image ? `<img src="${poi.image}" class="popup-img" alt="${poi.name}">` : ''}
                <p class="popup-desc">${poi.description}</p>
            </div>
        `;
        marker.bindPopup(popupContent);
    });

</script>
</body>
</html>
