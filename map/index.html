<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Map Viewer - Material 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="search-bar m3-elevation-2">
        <span class="material-symbols-rounded icon">menu</span>
        <input type="text" id="search-input" placeholder="在地图上搜索...">
        <span class="material-symbols-rounded icon" id="btn-settings">settings</span>
    </div>

    <div class="zoom-controls m3-elevation-2">
        <button id="btn-zoom-in"><span class="material-symbols-rounded">add</span></button>
        <div class="divider"></div>
        <button id="btn-zoom-out"><span class="material-symbols-rounded">remove</span></button>
    </div>

    <div class="coord-display m3-elevation-1" id="coord-display">
        X: <span id="display-x">0</span> Z: <span id="display-z">0</span>
    </div>

    <div class="crosshair" id="crosshair">
        <span class="material-symbols-rounded">add</span>
    </div>

    <div class="preview-container" id="map-container">
        <div class="tile-container"></div>
        <canvas id="overlay-canvas"></canvas> <div class="marker-container" id="marker-container"></div>
    </div>

    <div class="detail-panel m3-elevation-3" id="detail-panel">
        <div class="drag-handle"></div>
        <div class="panel-content">
            </div>
    </div>

    <div class="context-menu m3-elevation-3" id="context-menu">
        <div class="menu-header">
            <span class="material-symbols-rounded">location_on</span>
            <div class="coords">X: <span id="ctx-x">0</span>, Z: <span id="ctx-z">0</span></div>
        </div>
        <div class="divider"></div>
        <button class="menu-item" id="ctx-copy"><span class="material-symbols-rounded">content_copy</span> 复制坐标</button>
        <button class="menu-item" id="ctx-route-to"><span class="material-symbols-rounded">directions</span> 到这里去</button>
        <button class="menu-item" id="ctx-route-from"><span class="material-symbols-rounded">trip_origin</span> 从这里出发</button>
        <div class="divider"></div>
        <button class="menu-item" id="ctx-add-poi"><span class="material-symbols-rounded">add_location_alt</span> 添加地点</button>
    </div>

    <div class="settings-dialog m3-elevation-4" id="settings-dialog">
        <h3>地图设置</h3>
        <label class="m3-switch-label">
            <span>显示十字准星</span>
            <input type="checkbox" id="setting-crosshair" checked>
        </label>
        <label class="m3-switch-label">
            <span>显示当前坐标</span>
            <input type="checkbox" id="setting-coords" checked>
        </label>
        <label class="m3-switch-label">
            <span>记住上次位置</span>
            <input type="checkbox" id="setting-remember" checked>
        </label>
        <button id="btn-close-settings">关闭</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
