<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Minecraft Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
html,body { margin:0; height:100%; }
#map { width:100%; height:100%; background:#111; }
</style>
</head>

<body>
<div id="map"></div>

<script>
// =============================
// 🔥 自动识别 GitHub Pages 路径
// =============================
const BASE_PATH = location.pathname.includes("/map")
  ? "/HJTR/map"
  : "";

// =============================
// 🔧 配置
// =============================
const MAX_ZOOM = 4;  // ⚠️ 改成你实际zoom数量
const MIN_ZOOM = 0;
const MAP_SIZE = 8192;

// =============================
// 初始化地图
// =============================
const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: MIN_ZOOM,
  maxZoom: MAX_ZOOM,
});

// 地图范围
const bounds = [[0,0],[MAP_SIZE, MAP_SIZE]];
map.fitBounds(bounds);

// =============================
// 🔥 核心：自定义路径（修复版）
// =============================
const layer = L.tileLayer('', {
  tileSize: 256,
  noWrap: true,
  bounds: bounds,

  getTileUrl: function(coords) {

    const z = coords.z;
    const x = coords.x;
    const y = coords.y;

    // 👇 关键路径（已修复）
    return `${BASE_PATH}/tiles/zoom.${z}/${x}/${y}/tile.${x}.${y}.webp`;
  }

});

layer.addTo(map);

// =============================
// 🧪 调试：打印失败tile
// =============================
layer.on('tileerror', function(e) {
  console.log("❌ Tile加载失败:", e.coords);
});

// =============================
// 🧪 点击查看坐标
// =============================
map.on('click', e => {
  console.log("坐标:", e.latlng);
});

// =============================
// 测试点
// =============================
L.marker([4000,4000])
  .addTo(map)
  .bindPopup("测试点")
  .openPopup();

</script>
</body>
</html>
