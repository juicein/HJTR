<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>公交管理系统 M3 Expressive</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
/* Material 3 Expressive 色彩系统 */
:root {
  --md-sys-color-primary: #006495;
  --md-sys-color-on-primary: #ffffff;
  --md-sys-color-primary-container: #cbe6ff;
  --md-sys-color-on-primary-container: #001e30;
  --md-sys-color-surface: #fdfcff;
  --md-sys-color-surface-container: #f0f4f8;
  --md-sys-color-outline: #72777f;  
  --glass-bg: rgba(255, 255, 255, 0.85);
  --glass-border: 1px solid rgba(0, 0, 0, 0.05);
  --text-main: #1a1c1e;
  --text-sub: #44474e;
  --highlight-orange: #d95e00;
  --md-elevation-drag: 0 12px 28px rgba(0,0,0,0.12), 0 8px 10px rgba(0,0,0,0.08);
}

@media (prefers-color-scheme: dark) {
  :root {
    --md-sys-color-surface: #1a1c1e;
    --md-sys-color-surface-container: #202429;
    --md-sys-color-on-primary-container: #ffffff;
    --md-sys-color-primary-container: #006495;
    --md-sys-color-primary: #93cae4;
    --md-sys-color-outline: #8c9199;
    --glass-bg: rgba(30, 30, 30, 0.75);
    --glass-border: 1px solid rgba(255, 255, 255, 0.1);
    --text-main: #e2e2e2;
    --text-sub: #c4c7c5;
    --highlight-orange: #ffb480;
    --md-elevation-drag: 0 12px 28px rgba(0,0,0,0.4), 0 8px 10px rgba(0,0,0,0.3);
  }
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--md-sys-color-surface-container);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  line-height: 1.5;
  -webkit-tap-highlight-color: transparent;
}

/* 响应式主容器 */
.container {
  max-width: 840px;
  margin: 0 auto;
  padding: 16px;
}

/* Material 3 Top App Bar */
.m3-top-app-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  height: 64px;
  background: var(--md-sys-color-surface);
  color: var(--text-main);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  box-sizing: border-box;
}
.m3-top-app-bar .left-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.m3-top-app-bar h1 {
  font-size: 22px;
  font-weight: 500;
  margin: 0;
}
.m3-top-app-bar .actions {
  display: flex;
  gap: 8px;
}
.icon-btn {
  background: transparent;
  border: none;
  color: var(--text-main);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background-color 0.2s;
  padding: 0;
}
.icon-btn:hover, .icon-btn:active {
  background-color: var(--md-sys-color-surface-container);
}

.card {
  background: var(--glass-bg);
  border: var(--glass-border);
  border-radius: 24px;
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.02);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

/* 按钮样式 */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 10px 24px;
  border: none;
  border-radius: 100px;
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
  font-size: 14px;
}
.btn:hover { background-color: var(--md-sys-color-primary); opacity: 0.9; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.btn:active { box-shadow: none; transform: scale(0.98); }
.btn.delete { background: #ba1a1a; color: #ffffff; }
.btn.secondary { background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); }
.btn-icon-only { padding: 8px; width: 40px; height: 40px; }

/* 输入框与标签 */
.input-group { margin-bottom: 16px; }
label { display: block; font-size: 14px; color: var(--text-sub); font-weight: 500; margin-bottom: 6px; margin-left: 4px; }
input, select {
  width: 100%;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid var(--md-sys-color-outline);
  background: var(--md-sys-color-surface);
  color: var(--text-main);
  box-sizing: border-box;
  font-size: 15px;
  transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
}
input:focus, select:focus {
  outline: none;
  border-color: var(--md-sys-color-primary);
  box-shadow: 0 0 0 2px var(--md-sys-color-primary-container);
  background: var(--md-sys-color-surface);
}

/* 颜色选取器布局 */
.color-picker-wrapper {
  display: flex;
  gap: 12px;
  align-items: center;
}
.color-picker-btn {
  width: 48px;
  height: 48px;
  padding: 0;
  border: 1px solid var(--md-sys-color-outline);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  background: transparent;
  flex-shrink: 0;
}
.color-picker-btn::-webkit-color-swatch-wrapper { padding: 0; }
.color-picker-btn::-webkit-color-swatch { border: none; border-radius: 16px; }

/* 站点拖拽样式优化 (M3) */
.station {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  background: var(--md-sys-color-surface);
  padding: 6px 6px 6px 12px;
  border-radius: 16px;
  border: 1px solid var(--md-sys-color-outline);
  transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s;
}
/* SortableJS 拖拽高亮特效 */
.station.sortable-ghost { opacity: 0; }
.station.sortable-drag {
  opacity: 1 !important;
  background: var(--md-sys-color-primary-container);
  box-shadow: var(--md-elevation-drag);
  transform: scale(1.02);
  z-index: 10;
  border-color: transparent;
}
.station input { margin: 0; border: none; background: transparent; flex: 1; padding: 8px 4px; box-shadow: none; border-radius: 4px; }
.station input:focus { box-shadow: none; border-bottom: 2px solid var(--md-sys-color-primary); border-radius: 0; }
/* 拖拽手柄只允许操作此区域 */
.drag-handle { 
  cursor: grab; 
  color: var(--md-sys-color-outline); 
  padding: 8px; 
  touch-action: none; /* 必须，防止手机端滚动条冲突 */
  display: flex;
  align-items: center;
  justify-content: center;
}
.drag-handle:active { cursor: grabbing; color: var(--md-sys-color-primary); }

/* 过滤器区 */
.tools-bar { display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; padding: 16px 24px; }
.search-box { position: relative; }
.search-box .material-symbols-rounded { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--md-sys-color-outline); }
.search-box input { padding-left: 48px; margin-bottom: 0; }

.filter-chips { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  background: transparent;
  color: var(--md-sys-color-primary);
  border: 1px solid var(--md-sys-color-primary);
  border-radius: 16px;
  padding: 6px 16px;
  white-space: nowrap;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.chip.active { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }

/* 列表卡片优化 */
.line-item { padding-bottom: 16px; border-bottom: 1px solid var(--md-sys-color-outline); margin-bottom: 16px; display: flex; flex-direction: column; gap: 12px; }
.line-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.line-header { display: flex; justify-content: space-between; align-items: flex-start; }
.line-title { font-size: 18px; font-weight: 600; color: var(--highlight-orange); display: flex; align-items: center; gap: 8px;}
.line-tag { font-size: 12px; background: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container); padding: 4px 10px; border-radius: 12px; font-weight: normal; }
.line-desc { color: var(--text-sub); font-size: 14px; display: flex; flex-direction: column; gap: 4px; }
.line-desc span { display: flex; align-items: center; gap: 6px; }
.line-desc .material-symbols-rounded { font-size: 18px; opacity: 0.8;}
.line-actions { display: flex; gap: 8px; justify-content: flex-end; }

.hidden { display: none !important; }
</style>
</head>
<body>

<header class="m3-top-app-bar" id="topAppBar">
  <div class="left-area">
    <button class="icon-btn hidden" id="backBtn" onclick="back()">
      <span class="material-symbols-rounded">arrow_back</span>
    </button>
    <h1 id="appBarTitle">公交管理系统</h1>
  </div>
  <div class="actions">
    <button class="icon-btn" id="refreshBtn" onclick="loadData()" title="刷新云端数据">
      <span class="material-symbols-rounded">refresh</span>
    </button>
    <button class="icon-btn" id="addBtn" onclick="addLine()" title="新增线路">
      <span class="material-symbols-rounded">add</span>
    </button>
  </div>
</header>

<div class="container">
  
  <div id="loginBox" class="card" style="margin-top: 20px;">
    <h2 style="margin-top:0; color:var(--md-sys-color-primary); display:flex; align-items:center; gap:8px;">
      <span class="material-symbols-rounded">shield_person</span> 管理员验证
    </h2>
    <div class="input-group">
      <input id="pwd" type="password" placeholder="输入管理员口令">
    </div>
    <button class="btn" onclick="login()" style="width:100%; padding: 14px;">
      <span class="material-symbols-rounded">login</span> 登录系统
    </button>
  </div>

  <div id="listPage" class="hidden">
    <div class="card tools-bar">
      <div class="search-box">
        <span class="material-symbols-rounded">search</span>
        <input id="searchInput" placeholder="搜索线路名称或站点..." oninput="renderList()">
      </div>
      
      <div style="display:flex; flex-direction:column; gap:12px;">
        <select id="companyFilter" onchange="renderList()">
          <option value="all">🏢 所有归属公司</option>
        </select>

        <div class="filter-chips">
          <button class="chip active" onclick="setFilter('all', this)">全部</button>
          <button class="chip" onclick="setFilter('metro', this)">地铁/轨道</button>
          <button class="chip" onclick="setFilter('bus', this)">公交/BRT</button>
          <button class="chip" onclick="setFilter('rail', this)">铁路/高铁</button>
        </div>
      </div>
    </div>
    
    <div class="card" id="lineList"></div>
  </div>

  <div id="editPage" class="hidden">
    <div class="card">
      <div class="input-group">
        <label>线路名称</label>
        <input id="edit_name" placeholder="例如：102路">
      </div>

      <div style="display:flex; gap:12px;">
        <div class="input-group" style="flex:1;">
          <label>归属公司</label>
          <input id="edit_company" placeholder="例如：第一客运">
        </div>
        <div class="input-group" style="flex:1;">
          <label>运营地区</label>
          <input id="edit_region" placeholder="例如：主城区">
        </div>
      </div>

      <div class="input-group">
        <label>票价 / 服务信息</label>
        <input id="edit_price" placeholder="例如：2元 一票制">
      </div>

      <div class="input-group">
        <label>线路分类</label>
        <select id="edit_type">
          <option>公交</option>
          <option>BRT</option>
          <option>地铁</option>
          <option>单轨</option>
          <option>高铁</option>
          <option>铁路</option>
          <option>其他</option>
        </select>
      </div>

      <div style="display:flex; gap:12px;">
        <div class="input-group" style="flex:1">
          <label>首班车</label>
          <input type="time" id="edit_start">
        </div>
        <div class="input-group" style="flex:1">
          <label>末班车</label>
          <input type="time" id="edit_end">
        </div>
      </div>

      <div class="input-group">
        <label>标识颜色</label>
        <div class="color-picker-wrapper">
          <input id="edit_color" placeholder="点击右侧选取或输入十六进制，如：#FF0000">
          <input type="color" id="edit_color_picker" class="color-picker-btn">
        </div>
      </div>

      <div class="input-group">
        <label style="display:flex; align-items:center; gap:6px;">
          站点排列 <span style="font-size:12px; opacity:0.7;">(长按左侧 ☰ 可拖拽排序)</span>
        </label>
        <div id="stationBox" style="margin-top:10px;"></div>
        <button class="btn secondary" style="width:100%; margin-top:8px;" onclick="addStationAtEnd()">
          <span class="material-symbols-rounded">add_circle</span> 在末尾追加站点
        </button>
      </div>

      <div style="margin-top:32px;">
        <button class="btn" id="saveBtn" style="width:100%; padding:14px; border-radius:100px; font-size:16px;" onclick="saveEdit()">
          <span class="material-symbols-rounded">cloud_upload</span> 同步保存至云端
        </button>
      </div>
    </div>
  </div>

</div>

<script>
const API = "https://orange-king-0a98-hjtr-bus-api.1693076637.workers.dev";

let rawLines = [];
let lines = [];
let role = "";
let roleValue = "";
let editingIndex = null;
let currentFilter = 'all';
let sortableInstance = null; // 用于存储排序实例

// 颜色选择器双向绑定
const colorInput = document.getElementById('edit_color');
const colorPicker = document.getElementById('edit_color_picker');

colorPicker.addEventListener('input', (e) => {
  colorInput.value = e.target.value.toUpperCase();
});

colorInput.addEventListener('input', (e) => {
  const val = e.target.value;
  // 验证Hex格式
  if(/^#[0-9A-Fa-f]{6}$/i.test(val)) {
    colorPicker.value = val;
  }
});

// 页面加载时自动读取记住的密码
window.onload = () => {
  const savedPwd = localStorage.getItem("bus_admin_pwd");
  if(savedPwd) document.getElementById("pwd").value = savedPwd;
}

// 动态管理 M3 Top App Bar
function updateAppBar(mode) {
  const backBtn = document.getElementById('backBtn');
  const addBtn = document.getElementById('addBtn');
  const refreshBtn = document.getElementById('refreshBtn');
  const title = document.getElementById('appBarTitle');
  
  if (mode === 'list') {
    backBtn.classList.add('hidden');
    addBtn.classList.remove('hidden');
    refreshBtn.classList.remove('hidden');
    title.innerText = '公交管理系统';
  } else {
    backBtn.classList.remove('hidden');
    addBtn.classList.add('hidden');
    refreshBtn.classList.add('hidden');
    title.innerText = (editingIndex !== null && lines[editingIndex].raw === "") ? '新增线路' : '编辑线路';
  }
}

function parseLine(text){
  const obj = { raw: text };
  obj.name = (text.match(/【(.*?)】/)||[])[1]||"";
  obj.company = (text.match(/{(.*?)}/)||[])[1]||"";
  obj.region = (text.match(/『(.*?)』/)||[])[1]||"";
  obj.price = (text.match(/《(.*?)》/)||[])[1]||"";
  obj.type = (text.match(/θ(.*?)θ/)||[])[1]||"公交";
  obj.start = (text.match(/§(.*?)§/)||[])[1]||"06:00";
  obj.end = (text.match(/@(.*?)@/)||[])[1]||"22:00";
  obj.color = (text.match(/∮(.*?)∮/)||[])[1]||"";
  const stationPart = text.split("】")[1]?.split("-{")[0]||"";
  obj.stations = stationPart.split("-").filter(s => s);
  return obj;
}

function buildLine(l){
  let base = `【${l.name}】${l.stations.join("-")}-{${l.company}}`;
  if(l.price) base += `《${l.price}》`;
  base += `『${l.region}』θ${l.type}θ§${l.start}§@${l.end}@`;
  if(l.color) base += `∮${l.color}∮`;
  return base;
}

async function login(){
  const pwdInput = document.getElementById("pwd");
  const password = pwdInput.value.trim();
  if(!password) return;

  const btn = event.target.closest('button');
  const originalHtml = btn.innerHTML;
  btn.innerHTML = `<span class="material-symbols-rounded" style="animation: spin 1s linear infinite;">hourglass_empty</span> 验证中...`;

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: "login", password })
    });
    const data = await res.json();
    if(!data.success){
      alert("口令错误或权限不足");
      btn.innerHTML = originalHtml;
      return;
    }

    localStorage.setItem("bus_admin_pwd", password);
    role = data.type;
    roleValue = data.value || "";

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("listPage").classList.remove("hidden");
    updateAppBar('list');
    loadData();
  } catch(e) {
    alert("网络连接异常，请检查网络或Worker服务");
    btn.innerHTML = originalHtml;
  }
}

async function loadData(){
  const box = document.getElementById("lineList");
  box.innerHTML = `<p style='text-align:center; padding: 40px; color:var(--text-sub);'><span class="material-symbols-rounded" style="font-size:32px; animation: spin 1s linear infinite;">sync</span><br>正在同步云端数据...</p>`;
  
  try {
    const res = await fetch(API);
    const txt = await res.text();
    rawLines = txt.split("\n").filter(x => x.trim());
    lines = rawLines.map(parseLine);
    
    // 初始化公司筛选器
    initCompanyFilter();
    renderList();
  } catch(e) {
    box.innerHTML = `<p style='color:var(--highlight-orange); text-align:center; padding: 40px;'><span class="material-symbols-rounded" style="font-size:32px;">error</span><br>获取数据失败，请重试。</p>`;
  }
}

function initCompanyFilter() {
  const compSelect = document.getElementById("companyFilter");
  const uniqueCompanies = [...new Set(lines.map(l => l.company).filter(Boolean))];
  
  compSelect.innerHTML = '<option value="all">🏢 所有归属公司</option>';
  uniqueCompanies.forEach(c => {
    compSelect.innerHTML += `<option value="${c}">${c}</option>`;
  });

  // 如果权限受限于单一公司，锁定选择器
  if (role === "company") {
    compSelect.value = roleValue;
    compSelect.disabled = true;
  }
}

function setFilter(type, btnEl) {
  currentFilter = type;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  renderList();
}

function getVisibleLines(){
  let filtered = lines;
  
  // 1. 权限过滤
  if(role === "region") filtered = filtered.filter(x => x.region === roleValue);
  if(role === "company") filtered = filtered.filter(x => x.company === roleValue);

  // 2. 公司下拉筛选过滤
  const selectedCompany = document.getElementById("companyFilter").value;
  if(selectedCompany !== "all" && role !== "company") {
    filtered = filtered.filter(x => x.company === selectedCompany);
  }

  // 3. 标签分类过滤
  if(currentFilter === 'metro') {
    filtered = filtered.filter(x => ['地铁', '单轨', '轨道'].includes(x.type));
  } else if(currentFilter === 'bus') {
    filtered = filtered.filter(x => ['公交', 'brt', 'BRT'].includes(x.type));
  } else if(currentFilter === 'rail') {
    filtered = filtered.filter(x => ['铁路', '高铁', '城际'].includes(x.type));
  }

  // 4. 搜索过滤
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if(q) {
    filtered = filtered.filter(x => 
      x.name.toLowerCase().includes(q) || 
      x.stations.join("").toLowerCase().includes(q)
    );
  }

  return filtered;
}

function renderList(){
  const box = document.getElementById("lineList");
  box.innerHTML = "";
  const visible = getVisibleLines();

  if(visible.length === 0) {
    box.innerHTML = `<p style='text-align:center; padding:40px; color:var(--text-sub);'><span class="material-symbols-rounded" style="font-size:32px;">search_off</span><br>没有找到匹配的线路</p>`;
    return;
  }

  visible.forEach(l => {
    const realIndex = lines.indexOf(l);
    const first = l.stations[0] || "起点";
    const last = l.stations[l.stations.length-1] || "终点";

    const div = document.createElement("div");
    div.className = "line-item";
    div.innerHTML = `
      <div class="line-header">
        <div class="line-title">
          <span class="material-symbols-rounded" style="color: ${l.color || 'var(--highlight-orange)'}">directions_bus</span> 
          ${l.name} 
          <span class="line-tag">${l.type}</span>
        </div>
      </div>
      <div class="line-desc">
        <span><span class="material-symbols-rounded">route</span> ${first} ⇄ ${last}</span>
        <span><span class="material-symbols-rounded">corporate_fare</span> ${l.company} (${l.region}) · 🕒 ${l.start} - ${l.end}</span>
      </div>
      <div class="line-actions">
        <button class="btn secondary" onclick="editLine(${realIndex})"><span class="material-symbols-rounded" style="font-size:18px;">edit</span> 修改</button>
        <button class="btn delete" onclick="deleteLine(${realIndex}, event)"><span class="material-symbols-rounded" style="font-size:18px;">delete</span> 删除</button>
      </div>
    `;
    box.appendChild(div);
  });
}

function syncColorToPicker(colorVal) {
  colorInput.value = colorVal;
  if(/^#[0-9A-Fa-f]{6}$/i.test(colorVal)) {
    colorPicker.value = colorVal;
  } else {
    colorPicker.value = "#000000"; // Default reset
  }
}

function editLine(realIndex){
  editingIndex = realIndex;
  const l = lines[editingIndex];

  document.getElementById("listPage").classList.add("hidden");
  document.getElementById("editPage").classList.remove("hidden");
  updateAppBar('edit');

  document.getElementById("edit_name").value = l.name;
  document.getElementById("edit_company").value = l.company;
  document.getElementById("edit_region").value = l.region;
  document.getElementById("edit_price").value = l.price;
  
  const typeSelect = document.getElementById("edit_type");
  if([...typeSelect.options].some(opt => opt.value === l.type)) {
    typeSelect.value = l.type;
  } else {
    typeSelect.value = "其他"; 
  }

  document.getElementById("edit_start").value = l.start;
  document.getElementById("edit_end").value = l.end;
  syncColorToPicker(l.color);

  renderStations();
}

function addLine(){
  const newLine = {
    raw: "", 
    name: "新线路",
    company: role === "company" ? roleValue : "",
    region: role === "region" ? roleValue : "",
    price: "",
    type: currentFilter === 'metro' ? '地铁' : (currentFilter === 'rail' ? '高铁' : '公交'),

    end: "22:00",

  document.getElementById("listPage").classList.add("hidden");
  document.getElementById("editPage").classList.remove("hidden");
  updateAppBar('edit');

  document.getElementById("edit_name").value = newLine.name;
  document.getElementById("edit_company").value = newLine.company;
  document.getElementById("edit_region").value = newLine.region;
  document.getElementById("edit_price").value = newLine.price;
  document.getElementById("edit_type").value = newLine.type;
  document.getElementById("edit_start").value = newLine.start;
  document.getElementById("edit_end").value = newLine.end;
  syncColorToPicker(newLine.color);

  renderStations();
}

/* ================= 使用 SortableJS 处理移动/桌面级完美长按拖拽 ================= */
function renderStations(){
  const box = document.getElementById("stationBox");
  box.innerHTML = "";
  const currentStations = lines[editingIndex].stations;

  // 销毁旧的 Sortable 实例防止事件累加
  if (sortableInstance) {
    sortableInstance.destroy();
  }

  currentStations.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "station";
    div.dataset.index = i;

    div.innerHTML = `
      <div class="drag-handle material-symbols-rounded">drag_indicator</div>
      <input value="${s}" onchange="updateStationText(this)" placeholder="站点名称">
      <button class="btn secondary btn-icon-only" style="margin:0;" title="在此站后插入" onclick="insertStationAfter(this)">
        <span class="material-symbols-rounded">add</span>
      </button>
      <button class="btn delete btn-icon-only" style="margin:0; margin-left:6px;" title="删除" onclick="removeStation(this)">
        <span class="material-symbols-rounded">close</span>
      </button>
    `;
    box.appendChild(div);
  });

  // 初始化 SortableJS
  sortableInstance = new Sortable(box, {
    handle: '.drag-handle', // 仅允许拖拽手柄触发
    animation: 250,         // 顺滑的 M3 动画
    delay: 200,             // 长按 200ms 触发，完美契合手机端习惯，防误触
    delayOnTouchOnly: true, // 仅在触屏设备使用长按延迟，鼠标即点即拖
    forceFallback: true,    // 强制使用自定义 HTML5 拖拽，保证高亮图层生效
    fallbackClass: "sortable-drag", 
    onEnd: function (evt) {
      const oldI = evt.oldIndex;
      const newI = evt.newIndex;
      if(oldI === newI) return;
      
      // 更新底层数据数组
      const movedItem = currentStations.splice(oldI, 1)[0];
      currentStations.splice(newI, 0, movedItem);
      renderStations(); // 数据同步后重新渲染索引
    }
  });
}

// 采用节点定位法更新数据，避免原生DOM和数组Index错位
function updateStationText(inputEl) {
  const nodeIndex = Array.from(inputEl.parentNode.parentNode.children).indexOf(inputEl.parentNode);
  lines[editingIndex].stations[nodeIndex] = inputEl.value;
}

function addStationAtEnd(){
  lines[editingIndex].stations.push("新站点");
  renderStations();
}

function insertStationAfter(btnEl){
  const nodeIndex = Array.from(btnEl.parentNode.parentNode.children).indexOf(btnEl.parentNode);
  lines[editingIndex].stations.splice(nodeIndex + 1, 0, "新站点");
  renderStations();
}

function removeStation(btnEl){
  const nodeIndex = Array.from(btnEl.parentNode.parentNode.children).indexOf(btnEl.parentNode);
  lines[editingIndex].stations.splice(nodeIndex, 1);
  renderStations();
}

/* ======================================================= */

function back(){
  if(editingIndex !== null && lines[editingIndex].raw === ""){
    lines.splice(editingIndex, 1); 
  }
  editingIndex = null;
  
  const saveBtn = document.getElementById("saveBtn");
  saveBtn.innerHTML = `<span class="material-symbols-rounded">cloud_upload</span> 同步保存至云端`;
  
  document.getElementById("editPage").classList.add("hidden");
  document.getElementById("listPage").classList.remove("hidden");
  updateAppBar('list');
  renderList();
}

async function deleteLine(realIndex, e){
  if(!confirm("⚠️ 确认删除该线路吗？此操作将立即在云端生效。")) return;

  const l = lines[realIndex];
  const btn = e.target.closest('button');
  const oldHtml = btn.innerHTML;
  btn.innerHTML = `<span class="material-symbols-rounded" style="animation: spin 1s linear infinite;">hourglass_empty</span> 删除中`;

  const ok = await saveToServer("delete", l.raw, "");
  if(ok){
    lines.splice(realIndex, 1);
    renderList();
  } else {
    btn.innerHTML = oldHtml;
  }
}

async function saveEdit(){
  // 获取最新输入状态，以防 input onchange 未触发
  const stationInputs = document.querySelectorAll('#stationBox .station input');
  lines[editingIndex].stations = Array.from(stationInputs).map(i => i.value.trim()).filter(s => s);

  const l = lines[editingIndex];
  const oldRaw = l.raw;

  l.name = document.getElementById("edit_name").value.trim();
  l.company = document.getElementById("edit_company").value.trim();
  l.region = document.getElementById("edit_region").value.trim();
  l.price = document.getElementById("edit_price").value.trim();
  l.type = document.getElementById("edit_type").value;
  l.start = document.getElementById("edit_start").value;
  l.end = document.getElementById("edit_end").value;
  l.color = document.getElementById("edit_color").value.trim();

  if(!l.name || l.stations.length === 0){
    alert("请至少填写线路名称及一个站点。");
    return;
  }

  const newRaw = buildLine(l);
  const action = oldRaw ? "update" : "add";

  const btn = document.getElementById("saveBtn");
  btn.innerHTML = `<span class="material-symbols-rounded" style="animation: spin 1s linear infinite;">sync</span> 正在同步至云端...`;
  btn.disabled = true;

  const ok = await saveToServer(action, oldRaw, newRaw);
  
  btn.innerHTML = `<span class="material-symbols-rounded">cloud_upload</span> 同步保存至云端`;
  btn.disabled = false;

  if(ok){
    l.raw = newRaw; 
    back(); 
  }
}

async function saveToServer(action, oldRaw, newRaw){
  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: "save", action, oldRaw, newRaw })
    });

    if(!res.ok){
      const errTxt = await res.text();
      alert("云端保存失败: " + errTxt);
      return false;
    }
    return true;
  } catch(e) {
    alert("网络请求失败，请检查连接或代理配置: " + e.message);
    return false;
  }
}
