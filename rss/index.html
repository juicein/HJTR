<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSS Reader</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <div class="title">RSS</div>
  <button onclick="openManager()">订阅</button>
</div>

<!-- 分类栏 -->
<div id="tabs" class="tabs"></div>

<!-- 信息流 -->
<div id="feed" class="feed"></div>

<!-- 详情页 -->
<div id="article" class="article hidden"></div>

<!-- 订阅管理 -->
<div id="manager" class="manager hidden">
  <div class="panel">
    <h3>管理订阅</h3>

    <div class="input-row">
      <input id="rssInput" placeholder="输入 RSS 地址">
      <button onclick="addFeed()">添加</button>
    </div>

    <div id="feedList"></div>

    <button class="close" onclick="closeManager()">关闭</button>
  </div>
</div>

<script src="../rss/app.js"></script>
</body>
</html>
