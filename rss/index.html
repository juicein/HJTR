<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RSS</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="topbar">
  <div class="title">RSS</div>
  <button onclick="openManager()">订阅</button>
</div>

<div id="tabs" class="tabs"></div>

<div id="feed" class="feed"></div>

<div id="manager" class="manager hidden">
  <div class="panel">
    <h3>订阅管理</h3>

    <div class="input-row">
      <input id="rssInput" placeholder="RSS地址">
      <input id="rssCat" placeholder="分类">
      <button onclick="addFeed()">添加</button>
    </div>

    <div id="feedList"></div>
    <button onclick="closeManager()">关闭</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
